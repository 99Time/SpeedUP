<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedUP - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.6/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.2), transparent 28%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 26%),
                #020617;
        }

        .login-panel {
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 18px 50px rgba(2, 6, 23, 0.35);
            backdrop-filter: blur(14px);
        }
    </style>
</head>
<body class="text-base-content">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="card w-full max-w-md login-panel shadow-xl">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="text-3xl font-bold tracking-[0.35em] uppercase text-slate-100">SpeedUP</div>
                    <p class="text-sm text-slate-400 mt-2">Sign in to the SpeedUP Puck server dashboard and control panel.</p>
                </div>
                <form id="login-form">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Password</span>
                        </label>
                        <input type="password" name="password" placeholder="Enter admin password" class="input input-bordered" required autofocus />
                    </div>

                    <div id="error-message" class="text-error text-sm text-center mt-3 hidden">
                        Invalid password. Please try again.
                    </div>

                    <div class="form-control mt-6">
                        <button type="submit" class="btn btn-primary">Enter SpeedUP</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const errorMessage = document.getElementById('error-message');
            const submitButton = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                errorMessage.classList.add('hidden');
                submitButton.classList.add('loading');

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: form.elements.password.value })
                    });

                    if (!response.ok) {
                        errorMessage.textContent = response.status === 429
                            ? 'Too many failed login attempts. Please wait and try again.'
                            : 'Invalid password. Please try again.';
                        errorMessage.classList.remove('hidden');
                        return;
                    }

                    window.location.href = '/dashboard.html';
                } catch (error) {
                    console.error('Login request failed:', error);
                    errorMessage.textContent = 'Network error. Could not connect to server.';
                    errorMessage.classList.remove('hidden');
                } finally {
                    submitButton.classList.remove('loading');
                }
            });
        });
    </script>
</body>
</html>
